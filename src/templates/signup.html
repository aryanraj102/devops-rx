{% extends "base.html" %}
{% block title %}Create account — DevOps-Rx{% endblock %}
{% block content %}

<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>Create your account</h1>
      <p>Free to start. No credit card required.</p>
    </div>

    {% if google_enabled %}
    <a href="{{ url_for('google_auth') }}" class="btn-google">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign up with Google
    </a>

    <div class="divider"><span>or</span></div>
    {% endif %}

    <form method="POST" action="{{ url_for('signup') }}" id="signup-form" novalidate>
      <div class="form-row">
        <div class="form-group">
          <label for="first_name">First name</label>
          <input type="text" id="first_name" name="first_name" value="{{ prefill.get('first_name', '') }}" placeholder="Jane" required autocomplete="given-name" />
        </div>
        <div class="form-group">
          <label for="last_name">Last name</label>
          <input type="text" id="last_name" name="last_name" value="{{ prefill.get('last_name', '') }}" placeholder="Smith" required autocomplete="family-name" />
        </div>
      </div>
      <div class="form-group">
        <label for="email">Work email</label>
        <input type="email" id="email" name="email" value="{{ prefill.get('email', '') }}" placeholder="jane@company.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Min. 6 characters" required autocomplete="new-password" />
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required autocomplete="new-password" />
      </div>
      <div id="pw-error" class="field-error" style="display:none">Passwords do not match.</div>
      <button type="submit" class="btn btn-primary btn-full">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
  </div>
</div>

<script>
document.getElementById('signup-form').addEventListener('submit', function(e) {
  var pw = document.getElementById('password').value;
  var cpw = document.getElementById('confirm_password').value;
  var err = document.getElementById('pw-error');
  if (pw !== cpw) {
    e.preventDefault();
    err.style.display = 'block';
  } else {
    err.style.display = 'none';
  }
});
</script>

{% endblock %}
